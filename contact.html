<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Ausor | Contact</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- ========================= -->
  <!-- HEADER -->
  <!-- ========================= -->

  <header>

    <div class="navbar">

      <!-- LOGO -->
      <a href="index.html" class="logo-container">

        <img
          src="images/gaypeople.png"
          alt="Ausor Logo"
          class="logo-image"
        >

        <div class="logo-text">
          Company Name
        </div>

      </a>

      <!-- NAVIGATION -->
      <nav class="nav-links">

        <a href="index.html">
          Home
        </a>

        <a href="about.html">
          About
        </a>

        <a href="contact.html" class="active">
          Contact
        </a>

      </nav>

    </div>

  </header>

  <!-- ========================= -->
  <!-- CONTACT SECTION -->
  <!-- ========================= -->

  <section class="page-section">

    <div class="container">

      <h1 class="page-title">
        Contact Us
      </h1>

      <div class="contact-box">

        <form id="contact-form">

          <input
            type="text"
            id="contact-name"
            placeholder="Your Name"
            required
          >

          <input
            type="email"
            id="contact-email"
            placeholder="Email Address"
            required
          >

          <input
            type="tel"
            id="contact-phone"
            placeholder="Phone Number"
            required
          >

          <textarea
            id="contact-issue"
            placeholder="Describe your project, issue, or request..."
            rows="6"
            required
          ></textarea>

          <button type="submit">
            Submit Request
          </button>

        </form>

      </div>

    </div>

  </section>

  <!-- ========================= -->
  <!-- FOOTER -->
  <!-- ========================= -->

  <footer>
    © 2026 Ausor. All rights reserved.
  </footer>

  <script>

  /* ========================= */
  /* CONTACT FORM */
  /* ========================= */

  const contactForm =
    document.getElementById("contact-form");

  contactForm.addEventListener(
    "submit",
    async (e) => {

      e.preventDefault();

      const name =
        document.getElementById("contact-name")
        .value
        .trim();

      const email =
        document.getElementById("contact-email")
        .value
        .trim()
        .toLowerCase();

      const phone =
        document.getElementById("contact-phone")
        .value
        .trim();

      const issue =
        document.getElementById("contact-issue")
        .value
        .trim();

      try {

        const response = await fetch(
          "https://script.google.com/macros/s/AKfycbxcXq8Om2mYrG_XLAW4-9WwuLTdAy5hKIqaEtMODlh7EVb_643k7TFtDNvjhG4oAXXp-A/exec",
          {
            method: "POST",
            body: JSON.stringify({
              name,
              email,
              phone,
              issue
            })
          }
        );

        const result =
          await response.json();

        if (result.success) {

          alert(
            "Request submitted successfully!"
          );

          contactForm.reset();

        } else {

          alert(
            result.message ||
            "Unable to submit request."
          );

        }

      } catch (error) {

        console.error(error);

        alert(
          "Something went wrong. Please try again."
        );

      }

    }
  );

</script>
</body>
</html>
